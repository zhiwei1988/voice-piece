name: Koe
options:
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  defaultConfig: Release

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: nz.owo.koe
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ENABLE_HARDENED_RUNTIME: YES
    APP_UPDATE_FEED_URL: "https://raw.githubusercontent.com/missuo/koe/main/docs/update-feed.json"

targets:
  Koe:
    type: application
    platform: macOS
    sources:
      - path: Koe
        excludes:
          - "*.entitlements"
    settings:
      base:
        INFOPLIST_FILE: Koe/Info.plist
        CODE_SIGN_ENTITLEMENTS: Koe/Koe.entitlements
        PRODUCT_NAME: Koe
        HEADER_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/../koe-core/target"
        LIBRARY_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/../target/aarch64-apple-darwin/release"
          - "$(SRCROOT)/../target/x86_64-apple-darwin/release"
          - "$(SRCROOT)/../target/release"
        OTHER_LDFLAGS:
          - "-lkoe_core"
          - "-lSystem"
          - "-lresolv"
          - "-framework Security"
          - "-framework CoreFoundation"
          - "-framework UserNotifications"
        ENABLE_APP_SANDBOX: NO
        CLANG_ENABLE_OBJC_ARC: YES
    dependencies: []
    preBuildScripts:
      - name: Build Rust Library
        script: |
          export PATH="$HOME/.cargo/bin:/opt/homebrew/bin:/usr/local/bin:$PATH"
          cd "${SRCROOT}/.."
          if [ "$ARCHS" = "x86_64" ]; then
            RUST_TARGET="x86_64-apple-darwin"
          else
            RUST_TARGET="aarch64-apple-darwin"
          fi
          cargo build --manifest-path koe-core/Cargo.toml --release --target "$RUST_TARGET"
        basedOnDependencyAnalysis: false
    frameworks:
      - AVFoundation
      - AppKit
      - ApplicationServices
      - Carbon
      - CoreAudio
      - AudioToolbox
      - ServiceManagement
      - UserNotifications
      - sdk: libsqlite3.tbd
