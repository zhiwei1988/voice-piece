name: Build Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload assets to (e.g. v1.0.8)"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            rust-target: aarch64-apple-darwin
            asset-name: Koe-macOS-arm64.zip
          - arch: x86_64
            rust-target: x86_64-apple-darwin
            asset-name: Koe-macOS-x86_64.zip

    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Build Rust library
        run: cargo build --manifest-path koe-core/Cargo.toml --release --target ${{ matrix.rust-target }}

      - name: Build macOS app
        run: |
          xcodebuild -project KoeApp/Koe.xcodeproj \
            -scheme Koe \
            -configuration Release \
            -derivedDataPath build \
            ARCHS=${{ matrix.arch }} \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Create zip
        run: ditto -c -k --keepParent build/Build/Products/Release/Koe.app ${{ matrix.asset-name }}

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.event.release.tag_name || inputs.tag }}"
          gh release upload "$tag" "${{ matrix.asset-name }}" --clobber
