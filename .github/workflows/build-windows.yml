name: Build Windows

on:
  push:
    branches: [main]
    paths:
      - 'koe-core/**'
      - 'koe-asr/**'
      - 'koe-win/**'
      - 'Cargo.toml'
      - '.github/workflows/build-windows.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Check koe-core
        run: cargo check -p koe-core

      - name: Check koe-asr
        run: cargo check -p koe-asr

      - name: Check koe-win
        run: cargo check -p koe-win

      - name: Test koe-core
        run: cargo test -p koe-core

      - name: Test koe-asr
        run: cargo test -p koe-asr

      - name: Build koe-win (release)
        run: cargo build --release -p koe-win

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: koe-windows-x86_64
          path: target/release/koe.exe
